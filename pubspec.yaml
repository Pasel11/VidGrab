name: vidgrab
description: 'VidGrab - Professional Video Downloader for 12+ platforms'
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State Management
  provider: ^6.1.1

  # Storage
  path_provider: ^2.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  path: ^1.9.0

  # Network
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # UI & Animations
  google_fonts: ^6.2.1
  iconsax: ^0.0.8
  flutter_animate: ^4.3.0
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.3.1
  confetti: ^0.7.0

  # Features
  url_launcher: ^6.2.5
  share_plus: ^7.2.2
  webview_flutter: ^4.7.0
  local_auth: ^2.2.0
  flutter_secure_storage: ^9.0.0
  flutter_local_notifications: ^17.0.0
  permission_handler: ^11.3.1

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/